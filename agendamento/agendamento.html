<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
     <link rel="stylesheet" href="../style.css">
     <link rel="stylesheet" href="agendamento.css">
    <title>Agendamento</title>
</head>
<body>

    <section class="container">
       <div id="navbar"></div>


    <main class="principal"><!-- principal -->
     
        

<div class="formularioPai">
  <h2>NOVO AGENDAMENTO</h2>
  <form onsubmit="criarCard(event)">
    <input type="text" placeholder="Nome do Cliente" id="nome">
    <input type="text" placeholder="WhatsApp (DDD + Número)" id="whats">
    
    <div class="input-group">
      <input type="date" id="data">
      <input type="time" id="hora">
    </div>

    <div id="container-procedimentos">
    <div class="input-group">
      <input type="text" placeholder="Procedimento" class="servico">
      <input type="number" placeholder="R$50" class="preco" oninput="calcularTotalAutomatico()" required>
    </div>
</div>

<button type="button" id="adicionar" onclick="adicionarNovoServico()">+ ADICIONAR SERVIÇO</button>
    <button type="submit" class="btn-agendar">AGENDAR</button>
  </form>
</div>

    </main><!-- principal -->

    <div class="card">
           <div class="pesquisa"><!-- pesquisa -->
            <form action="/search" method="GET" onsubmit="event.preventDefault()">
                <input type="text" id="inputPesquisar" placeholder="pesquise por numero ou nome ou data.." oninput="filtrarCards()">
                <button type="submit">Buscar</button>
            </form>
        </div><!-- pesquisa -->

        <!--  divisão -->
     
        <div id="card" class="main-card"></div>
    

    
          
        </div><!-- conteudo da pagina principal -->


    </div>

    </section>
        
   
    

    
</body>
<script src="../navbar/navbar.js"></script>
<script src="agendamento.js"></script>

</html>
