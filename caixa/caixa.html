<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../style.css">
    <title>Financeiro - Caixa</title>
    <style>
        /* Estilos específicos para a navegação de meses */
        .navegacao-meses {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            background: #19191d;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(241, 150, 13, 0.3);
        }
        .mes-foco {
            font-size: 18px;
            font-weight: bold;
            color: #f1960d;
            text-transform: uppercase;
            min-width: 180px;
            text-align: center;
        }
        .btn-mes-seta {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-mes-seta:hover {
            color: #f1960d;
            transform: scale(1.2);
        }
    </style>
</head>
<body>

    <section class="container">
        <div id="navbar"></div>

        <main class="principal">
            <div class="painel-status">
                <div class="status-item">
                    <span class="label">GANHO HOJE</span>
                    <span class="valor" id="ganhoHoje" style="color: #5df312;">R$ 0,00</span>
                </div>
                <div class="status-item">
                    <span class="label">TOTAL DO MÊS</span>
                    <span class="valor" id="ganhoMes" style="color: #4a90e2;">R$ 0,00</span>
                </div>
                <div class="status-item">
                    <button onclick="fecharCaixa()" style="background: #e74c3c; border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold;">FECHAR DIA</button>
                </div>
            </div>

            <div class="navegacao-meses">
                <button onclick="mudarMes(-1)" class="btn-mes-seta"><i class="bi bi-chevron-left"></i></button>
                <div id="mes-atual-display" class="mes-foco">MARÇO 2026</div>
                <button onclick="mudarMes(1)" class="btn-mes-seta"><i class="bi bi-chevron-right"></i></button>
            </div>

            <div class="cardHome" id="containerCaixa">
                </div>
        </main>
    </section>

    <script src="../navbar/navbar.js"></script>
    <script src="caixa.js"></script>
</body>
</html>
