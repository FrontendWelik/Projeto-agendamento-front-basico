<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="cancelados.css">
    <title>Clientes Cancelados</title>
</head>
<body>
    <section class="container">
        <div id="navbar"></div>

        <main class="principal">
            <div class="painel-status">
                <div class="status-item">
                    <span class="label">TOTAL CANCELADOS</span>
                    <span class="valor" id="totalCancelados" style="color: #e74c3c;">0</span>
                </div>
                <div class="status-item">
                    <span class="label">PERDA ESTIMADA</span>
                    <span class="valor" id="perdaTotal" style="color: #95a5a6;">R$ 0,00</span>
                </div>
            </div>

            <div class="pesquisa">
                <form onsubmit="event.preventDefault()">
                    <input type="text" id="inputPesquisar" placeholder="Buscar nos cancelados..." oninput="filtrarCancelados()">
                </form>
            </div>

            <div class="cardHome" id="containerCancelados"></div>
        </main>
    </section>

    <script src="../navbar/navbar.js"></script>
    <script src="cancelados.js"></script>
    <script src="../auth.js"></script>
</body>
</html>
