<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="historico.css">
    <title>Histórico de Atendimentos</title>
</head>
<body>
    <section class="container">
        <div id="navbar"></div>

        <main class="principal">
            <div class="painel-status">
                <div class="status-item">
                    <span class="label">TOTAL FINALIZADOS</span>
                    <span class="valor" id="totalFinalizados">0</span>
                </div>
                <div class="status-item">
                    <span class="label">FATURAMENTO TOTAL</span>
                    <span class="valor" id="faturamentoTotal">R$ 0,00</span>
                </div>
            </div>

            <div class="pesquisa">
                <form onsubmit="event.preventDefault()">
                    <input type="text" id="inputPesquisar" placeholder="Buscar no histórico..." oninput="filtrarHistorico()">
                </form>
            </div>

            <div class="cardHistorico" id="containerHistorico"></div>
        </main>
    </section>

    <script src="../navbar/navbar.js"></script>
    <script src="historico.js"></script>
</body>
</html>
