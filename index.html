<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
     <link rel="stylesheet" href="style.css">
    <title>Home - Dashboard</title>
</head>
<body>

    <section class="container">
        <div id="navbar"></div>

        <main class="principal">
            <div class="painel-status">
                <div class="status-item">
                    <span class="label">CLIENTES ATIVOS</span>
                    <span class="valor" id="totalClientes">0</span>
                </div>
                <div class="status-item">
                    <span class="label">DATA DE HOJE</span>
                    <span class="valor" id="dataAtual">--/--/----</span>
                </div>
                <div class="status-item">
                    <span class="label">HORÁRIO</span>
                    <span class="valor" id="horaAtual">00:00:00</span>
                </div>
            </div>

            <div class="pesquisa">
                <form onsubmit="event.preventDefault()">
                    <input type="text" id="inputPesquisar" placeholder="Pesquisar na home..." oninput="filtrarHome()">
                    <button type="button">Buscar</button>
                </form>
            </div>

            <div class="cardHome" id="containerHome">
                </div>
        </main>
    </section>

    <script src="../navbar/navbar.js"></script>
    <script src="home.js"></script> 
    <script src="contagemClientes.js"></script>
</body>
</html>
